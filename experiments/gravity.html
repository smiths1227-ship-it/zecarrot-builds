<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>gravity sim — zecarrot</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d0d; color: #e0e0e0; font-family: 'JetBrains Mono', monospace; min-height: 100vh; padding: 2rem; display: flex; flex-direction: column; }
    nav { display: flex; gap: 2rem; margin-bottom: 2rem; font-size: 0.8rem; letter-spacing: 0.1em; }
    nav a { color: #888; text-decoration: none; text-transform: uppercase; transition: color 0.2s; }
    nav a:hover, nav a.active { color: #ff6b35; }
    .page { display: flex; flex-direction: column; align-items: center; flex: 1; }
    h1 { font-size: 1.5rem; color: #fff; margin-bottom: 0.25rem; }
    .sub { color: #555; font-size: 0.8rem; margin-bottom: 1rem; }
    .controls { display: flex; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; justify-content: center; }
    button {
      background: #1a1a1a; border: 1px solid #2a2a2a; color: #888;
      font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
      padding: 0.4rem 1rem; border-radius: 6px; cursor: pointer; transition: all 0.2s;
    }
    button:hover { border-color: #ff6b35; color: #ff6b35; }
    button.active-btn { border-color: #ff6b35; color: #ff6b35; background: #1a0d05; }
    canvas { border: 1px solid #1a1a1a; border-radius: 8px; cursor: crosshair; display: block; }
    .hint { color: #333; font-size: 0.75rem; margin-top: 0.75rem; }
    .footer { margin-top: auto; padding-top: 2rem; color: #444; font-size: 0.75rem; text-align: center; }
  </style>
</head>
<body>
  <nav>
    <a href="../index.html">home</a>
    <a href="../projects.html">projects</a>
    <a href="../about.html">about</a>
    <a href="calculator.html" class="active">experiments</a>
  </nav>
  <div class="page">
    <h1>gravity sim</h1>
    <p class="sub">// experiment 006 — click to add bodies</p>
    <div class="controls">
      <button onclick="addRandom()">add random</button>
      <button onclick="bodies=trails=[]">clear</button>
      <button id="trailBtn" class="active-btn" onclick="toggleTrails()">trails on</button>
      <button onclick="addSolarSystem()">solar system</button>
    </div>
    <canvas id="c"></canvas>
    <p class="hint">click canvas to place a body · bodies attract each other · they merge on collision</p>
  </div>
  <div class="footer">zecarrot-builds — made with too much free time</div>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    canvas.width = Math.min(700, window.innerWidth - 64);
    canvas.height = 450;

    let bodies = [], trails = [], showTrails = true;
    const G = 0.5;

    function Body(x, y, mass, vx=0, vy=0, color=null) {
      return { x, y, vx, vy, mass, r: Math.max(3, Math.sqrt(mass)*2), color: color || `hsl(${Math.random()*60+10},90%,60%)` };
    }

    function addRandom() {
      const m = Math.random()*30+5;
      bodies.push(Body(Math.random()*canvas.width, Math.random()*canvas.height, m, (Math.random()-0.5)*2, (Math.random()-0.5)*2));
    }

    function addSolarSystem() {
      bodies = []; trails = [];
      const cx = canvas.width/2, cy = canvas.height/2;
      bodies.push(Body(cx, cy, 800, 0, 0, '#ff6b35'));
      const orbitData = [[80,3,'#4fc3f7'],[130,2,'#81c784'],[180,1.5,'#fff176'],[240,1.2,'#ef9a9a'],[310,0.8,'#ce93d8']];
      orbitData.forEach(([r,s,col]) => {
        const angle = Math.random()*Math.PI*2;
        const speed = Math.sqrt(G * 800 / r);
        bodies.push(Body(cx+Math.cos(angle)*r, cy+Math.sin(angle)*r, s*5, -Math.sin(angle)*speed, Math.cos(angle)*speed, col));
      });
    }

    function toggleTrails() {
      showTrails = !showTrails;
      const btn = document.getElementById('trailBtn');
      btn.textContent = showTrails ? 'trails on' : 'trails off';
      btn.className = showTrails ? 'active-btn' : '';
      if (!showTrails) trails = [];
    }

    canvas.addEventListener('click', e => {
      const rect = canvas.getBoundingClientRect();
      bodies.push(Body(e.clientX-rect.left, e.clientY-rect.top, Math.random()*20+10));
    });

    function update() {
      for (let i = 0; i < bodies.length; i++) {
        for (let j = i+1; j < bodies.length; j++) {
          const a = bodies[i], b = bodies[j];
          const dx = b.x-a.x, dy = b.y-a.y;
          const dist = Math.sqrt(dx*dx+dy*dy);
          if (dist < a.r+b.r) {
            const total = a.mass+b.mass;
            a.x = (a.x*a.mass+b.x*b.mass)/total;
            a.y = (a.y*a.mass+b.y*b.mass)/total;
            a.vx = (a.vx*a.mass+b.vx*b.mass)/total;
            a.vy = (a.vy*a.mass+b.vy*b.mass)/total;
            a.mass = total; a.r = Math.max(3, Math.sqrt(total)*2);
            bodies.splice(j,1); j--;
            continue;
          }
          const f = G*a.mass*b.mass/(dist*dist+10);
          const fx = f*dx/dist, fy = f*dy/dist;
          a.vx += fx/a.mass; a.vy += fy/a.mass;
          b.vx -= fx/b.mass; b.vy -= fy/b.mass;
        }
      }
      bodies.forEach(b => {
        if (showTrails) trails.push({x:b.x, y:b.y, color:b.color, life:60});
        b.x += b.vx; b.y += b.vy;
      });
      trails = trails.filter(t => t.life-- > 0);
    }

    function draw() {
      ctx.fillStyle = 'rgba(13,13,13,0.3)';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      if (showTrails) {
        trails.forEach(t => {
          ctx.beginPath(); ctx.arc(t.x, t.y, 1, 0, Math.PI*2);
          ctx.fillStyle = t.color + Math.floor(t.life/60*255).toString(16).padStart(2,'0');
          ctx.fill();
        });
      }
      bodies.forEach(b => {
        ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
        ctx.shadowColor = b.color; ctx.shadowBlur = b.r*2;
        ctx.fillStyle = b.color; ctx.fill();
        ctx.shadowBlur = 0;
      });
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    addSolarSystem();
    loop();
  </script>
</body>
</html>
